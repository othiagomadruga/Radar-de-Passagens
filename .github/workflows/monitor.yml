name: Radar de Passagens

on:
  schedule:
    # a cada 15 minutos. O cron do GitHub atrasa em horario de pico (5-20 min),
    # o que e aceitavel para o nosso caso; a cadencia de 15 min ja compensa.
    - cron: "*/15 * * * *"
  workflow_dispatch:        # permite rodar na hora pelo botao "Run workflow"

permissions:
  contents: write           # necessario para commitar o historico de volta

concurrency:
  group: radar
  cancel-in-progress: false # nunca dois ciclos gravando o historico ao mesmo tempo

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar ciclo de monitoramento
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # opcionais: sem eles o coletor roda so com as rotas do rotas.yaml
          RADAR_API_URL: ${{ secrets.RADAR_API_URL }}
          RADAR_API_KEY: ${{ secrets.RADAR_API_KEY }}
        run: python main.py

      - name: Commitar historico
        # o commit a cada ciclo tambem impede que o GitHub desative o cron
        # por inatividade (ele desliga schedules de repo parado ha 60 dias)
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add dados/
          if git diff --staged --quiet; then
            echo "nada novo para commitar"
          else
            git commit -m "dados: ciclo $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase --autostash
            git push
          fi
