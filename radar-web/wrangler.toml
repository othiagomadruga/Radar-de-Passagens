name = "radar-passagens"
main = "src/index.js"
compatibility_date = "2026-07-01"

# O cron roda de hora em hora e envia apenas os relatorios que estao vencidos
# conforme a periodicidade de cada assinatura. Rodar de hora em hora (em vez de
# uma vez por dia) faz o "diario" chegar perto do horario em que a pessoa assinou.
[triggers]
crons = ["7 * * * *"]

[[d1_databases]]
# O binding e "DB" (nome usado no codigo como env.DB), nao "radar".
# O snippet que o `wrangler d1 create` imprime sugere o nome do banco como
# binding; trocar isso quebraria todas as consultas.
binding = "DB"
database_name = "radar"
database_id = "b0b80956-d900-47e2-9e41-485fd827b49c"

[vars]
REMETENTE_NOME = "Radar de Passagens"
SITE_NOME = "Radar de Passagens"

# Segredos (nunca no arquivo, cadastrar com wrangler secret put):
#   BREVO_API_KEY     chave da API do Brevo
#   REMETENTE_EMAIL   endereco verificado no Brevo
#   CODIGO_CONVITE    codigo exigido no cadastro
#   RADAR_API_KEY     chave que o coletor do GitHub Actions usa
